<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
    	<title>Welcome</title>
		<style>
			.grid {
		  		display: grid;
		  		grid-template-columns: repeat(3, 50px);
		  		grid-gap: 5px;
			}

			.grid div {
		  		width: 50px;
		  		height: 50px;
			}
		</style>
	</head>
	<body>
		<div class="slider-container">
		    <input type="range" id="mySlider" min="0" th:max="${maxTime}" value="50">
		    <span id="sliderValue">0</span>
		</div>
		<div class="grid" id='gr'></div>
		<script th:inline="javascript">
			/* El error de la "coma" se quita usando el comentario especial de Thymeleaf */
			const count = /*[[${count}]]*/ 12;
			const colors = /*[[${colors}]]*/ {};

			function createSquares(){
				var grid = document.getElementById('gr');
				for(var i = 0; i < count; i++){
					for(var j = 0; j < count; j++){
						var node = document.createElement("div");
						// IMPORTANTE: El ID debe ser i+'-'+j porque así lo busca el slider abajo
						node.id = i+'-'+j;
						// Usamos || para que si no hay color en el segundo 0, no de error
						node.style.background = (colors && colors['0-'+i+'-'+j]) || 'white';
						grid.appendChild(node);
					}
				}
				document.getElementsByClassName('grid').item(0).style.gridTemplateColumns = 'repeat('+count+',50px)';
			}

			// Asegúrate de llamar a la función si no lo hace el HTML fuera
			createSquares();

			const slider = document.getElementById("mySlider");

			slider.addEventListener("input", function() {
				for(var y = 0; y < count; y++){
					for(var x = 0; x < count; x++){
						var node = document.getElementById(y+'-'+x);
						// El check 'if(node)' evita el error de "reading style of null"
						if(node) {
							node.style.background = colors[slider.value+'-'+y+'-'+x] || 'white';
						}
					}
				}
			});
		</script>
	</body>
</html>
